name: Setup gungraun-runner and valgrind
description: Installs gungraun-runner and valgrind on Linux runners
branding:
  icon: terminal
  color: purple

inputs:
  github-token:
    description:
      'GitHub token for API requests (avoids rate limits on release downloads)'
    required: false
    default: ''
  install-build-deps:
    description:
      'Install build dependencies before building valgrind from source'
    required: false
    default: 'false'
  runner-strategy:
    description:
      'Ordered comma-separated list of runner install strategies to try. Valid
      values: binstall, release, source, none'
    required: false
    default: 'binstall,release,source'
  runner-target:
    description:
      'Rust target triple (e.g. x86_64-unknown-linux-gnu). Auto-detected from
      rustc if omitted.'
    required: false
    default: ''
  runner-version:
    description:
      'Version of gungraun-runner to install (e.g. v0.1.0, latest, auto)'
    required: false
    default: 'auto'
  valgrind-configure-args:
    description:
      'The extra arguments to pass to ./configure when building valgrind from
      source'
    required: false
    default: ''
  valgrind-make-envs:
    description:
      'Environment variables to set when building valgrind from source (e.g.
      "CFLAGS=--fno-stack-protector"). These apply to both ./configure and make.'
    required: false
    default: ''
  valgrind-sha-url:
    description:
      'The url to the sha sum used to verify the tar archive for valgrind-url'
    required: false
    default: ''
  valgrind-strategy:
    description:
      'Ordered comma-separated list of valgrind install strategies to try. Valid
      values: builder, system, source, none. `none` will skip the valgrind
      installation.'
    required: false
    default: 'builder,source,system'
  valgrind-url:
    description:
      'The url to the tar archive containing the valgrind build for the
      valgrind-strategy: builder'
    required: false
    default: ''
  valgrind-version:
    description:
      'Valgrind release tag (e.g. v0.1.1, latest) or auto which installs the
      latest possible version for the strategy'
    required: false
    default: 'latest'

runs:
  using: 'node24'
  main: 'dist/index.js'
